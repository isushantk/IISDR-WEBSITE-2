name: 🎉 Deploy Website to BigRock

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚚 Deploy via FTP
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 📂 Sync files to BigRock
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER || secrets.FTP_HOST || vars.FTP_SERVER || vars.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER || vars.FTP_USERNAME || vars.FTP_USER }}
        password: ${{ secrets.FTP_PASSWORD || secrets.FTP_PASS || vars.FTP_PASSWORD || vars.FTP_PASS }}
        server-dir: public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          website_deploy.zip
          README.md
          update_footers.py
          update_navigation.py
